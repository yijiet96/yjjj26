        .floating-animation {
            animation: floating 6s ease-in-out infinite;

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #4facfe;
            border-radius: 50%;
            opacity: 0.7;
            animation: particle-float 8s linear infinite;
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes particle-float {
            0% {
                transform: translateY(100vh) translateX(0px);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }

            const [displayText, setDisplayText] = useState('');
            useEffect(() => {
                let i = 0;
                const timer = setInterval(() => {
                    setDisplayText(text.slice(0, i + 1));
                    i++;
                    if (i >= text.length) clearInterval(timer);
                }, speed);
                return () => clearInterval(timer);
            }, [text, speed]);
            return displayText;
        }

                        </form>
                        {status && <p className="mt-4 text-green-400">{status}</p>}
                        <button onClick={() => setPage({ name: 'home' })} className="mt-8 text-sky-400 font-semibold hover:text-white transition-colors">← 返回首頁</button>
                    </div>
                </main>
            );
        };

        const ResumePage = ({ setPage }) => {
            return (
                <main className="flex-grow flex flex-col items-center px-6 page-transition">
                    <div className="w-full max-w-4xl py-12">
                        <div className="flex justify-between items-center mb-10">
                            <h1 className="text-4xl md:text-5xl font-black text-white">我的履歷</h1>
                            <a href={profileData.pdfResumeUrl} target="_blank" className="bg-sky-500 text-white font-semibold px-5 py-3 rounded-md hover:bg-sky-600 transition-colors flex items-center gap-2">
                                <DownloadIcon />
                                <span>下載 PDF</span>
                            </a>
                        </div>

                        <div className="space-y-12">
                            {/* Experience Section */}
                            <div>
                                <h2 className="text-2xl font-bold text-sky-400 border-b-2 border-slate-700 pb-2 mb-6">工作經歷</h2>
                                <div className="space-y-6">
                                    {resumeData.experience.map(exp => (
                                        <div key={exp.id}>
                                            <div className="flex justify-between items-baseline">
                                                <h3 className="text-xl font-semibold text-white">{exp.title}</h3>
                                                <p className="text-sm text-slate-400 font-mono">{exp.period}</p>
                                            </div>
                                            <p className="text-md text-slate-300">{exp.company}</p>
                                            <p className="mt-2 text-slate-400">{exp.description}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Education Section */}
                            <div>
                                <h2 className="text-2xl font-bold text-sky-400 border-b-2 border-slate-700 pb-2 mb-6">學歷</h2>
                                <div className="space-y-4">
                                    {resumeData.education.map(edu => (
                                        <div key={edu.id}>
                                            <div className="flex justify-between items-baseline">
                                                <h3 className="text-xl font-semibold text-white">{edu.degree}</h3>
                                                <p className="text-sm text-slate-400 font-mono">{edu.period}</p>
                                            </div>
                                            <p className="text-md text-slate-300">{edu.school}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* Skills Section */}
                            <div>
                                <h2 className="text-2xl font-bold text-sky-400 border-b-2 border-slate-700 pb-2 mb-6">專業技能</h2>
                                <div className="space-y-4">
                                    {resumeData.skills.map(skillCat => (
                                        <div key={skillCat.id}>
                                            <h3 className="text-lg font-semibold text-white mb-2">{skillCat.category}</h3>
                                            <div className="flex flex-wrap gap-3">
                                                {skillCat.items.map(item => <span key={item} className="skill-badge text-sky-300 text-sm font-medium px-4 py-2 rounded-full">{item}</span>)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="text-center mt-16">
                            <button onClick={() => setPage({ name: 'home' })} className="text-sky-400 font-semibold hover:text-white transition-colors">← 返回首頁</button>
                        </div>
                    </div>
                </main>
            );
        };


        // --- Main App Component (Router) ---
        function App() {
            const [page, setPage] = useState({ name: 'home' });
            const [threads, setThreads] = useState([]);
            const [userId, setUserId] = useState(null);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            // Authentication and Data Fetching
            useEffect(() => {
                const initFirebase = () => {
                    if (Object.keys(firebaseConfig).length > 0 && !db) {
                        try {
                            const appInstance = firebase.initializeApp(firebaseConfig);
                            const authInstance = firebase.auth();
                            const dbInstance = firebase.firestore();
                            setAuth(authInstance);
                            setDb(dbInstance);
                        } catch (e) {
                            console.error("Error initializing Firebase:", e);
                        }
                    } else if (db) {
                         // Already initialized
                    } else {
                        console.log("Firebase not configured.");
                    }
                };
                
                if (window.firebase) {
                    initFirebase();
                } else {
                     // Wait for firebase to load
                    const interval = setInterval(() => {
                        if (window.firebase) {
                            clearInterval(interval);
                            initFirebase();
                        }
                    }, 100);
                }
            }, []);

            useEffect(() => {
                if (!db || !auth) {
                    // 離線模式：使用示例資料（討論區）
                    console.log("離線模式：使用示例討論區資料");
                    const sampleThreads = [
                        {
                            id: 't1',
                            title: '歡迎來到討論區',
                            content: '分享你的想法、問題與觀點吧！',
                            createdAt: new Date(),
                            comments: [
                                { id: 'c1', author: '訪客', text: '嗨大家好！', createdAt: new Date(), replies: [] }
                            ]
                        }
                    ];
                    setThreads(sampleThreads);
                    return;
                }

                const authAndFetch = async () => {
                    const { signInAnonymously, signInWithCustomToken } = firebase.auth;
                    const { collection, query, orderBy, onSnapshot, getDocs } = firebase.firestore;
                    try {
                        if (auth.currentUser) {
                             setUserId(auth.currentUser.uid);
                        } else {
                            if (initialAuthToken) {
                                await signInWithCustomToken(auth, initialAuthToken);
                            } else {
                                await signInAnonymously(auth);
                            }
                            setUserId(auth.currentUser.uid);
                        }
                        
                        const threadsCollectionRef = collection(db, `/artifacts/${appId}/public/data/forum/threads`);
                        const q = query(threadsCollectionRef, orderBy("createdAt", "desc"));

                        const unsubscribe = onSnapshot(q, async (querySnapshot) => {
                            try {
                                const threadsData = [];
                                for (const threadDoc of querySnapshot.docs) {
                                    const thread = { id: threadDoc.id, ...threadDoc.data(), comments: [] };
                                    try {
                                        const commentsCollectionRef = collection(db, `/artifacts/${appId}/public/data/forum/threads/${threadDoc.id}/comments`);
                                        const commentsQueryRef = query(commentsCollectionRef, orderBy("createdAt", "asc"));
                                        const commentsSnapshot = await getDocs(commentsQueryRef);

                                        const commentsWithReplies = [];
                                        for (const commentDoc of commentsSnapshot.docs) {
                                            const baseComment = { id: commentDoc.id, ...commentDoc.data(), replies: [] };
                                            try {
                                                const repliesCollectionRef = collection(db, `/artifacts/${appId}/public/data/forum/threads/${threadDoc.id}/comments/${commentDoc.id}/replies`);
                                                const repliesQueryRef = query(repliesCollectionRef, orderBy("createdAt", "asc"));
                                                const repliesSnapshot = await getDocs(repliesQueryRef);
                                                baseComment.replies = repliesSnapshot.docs.map(replyDoc => ({ id: replyDoc.id, ...replyDoc.data() }));
                                            } catch (replyError) {
                                                console.warn("無法載入回覆:", replyError);
                                                baseComment.replies = [];
                                            }
                                            commentsWithReplies.push(baseComment);
                                        }

                                        thread.comments = commentsWithReplies;
                                    } catch (commentError) {
                                        console.warn("無法載入留言:", commentError);
                                        thread.comments = [];
                                    }
                                    threadsData.push(thread);
                                }
                                setThreads(threadsData);
                            } catch (error) {
                                console.error("處理筆記數據時出錯:", error);
                                setThreads([]);
                            }
                        }, (error) => {
                            console.error("監聽筆記集合時出錯:", error);
                            setThreads([]);
                        });

                        return () => unsubscribe();
                    } catch (error) {
                        console.error("Firebase 認證/數據錯誤:", error);
                        // 認證失敗時使用示例數據
                        const sampleNotes = [
                            {
                                id: '1',
                                title: 'DeFi 市場分析',
                                content: '去中心化金融市場的發展趨勢分析，包含流動性挖礦、收益農場等熱門話題的深度探討。',
                                createdAt: new Date(),
                                comments: [
                                    {
                                        id: 'c1',
                                        author: 'Web3 愛好者',
                                        text: '非常詳細的分析，對理解 DeFi 生態很有幫助！',
                                        createdAt: new Date(),
                                        replies: []
                                    }
                                ]
                            },
                            {
                                id: '2',
                                title: '傳統金融與加密貨幣的橋接',
                                content: '探討如何將傳統金融的穩定性與加密貨幣的創新性結合，創造新的金融產品和服務。',
                                createdAt: new Date(),
                                comments: []
                            }
                        ];
                        setNotes(sampleNotes);
                    }
                };

                authAndFetch();

            }, [db, auth]);

            const addComment = async (threadId, author, text) => {
                if (!userId || !db) {
                    // 離線模式：直接更新本地狀態
                    setThreads(prevThreads => prevThreads.map(thread => {
                        if (thread.id === threadId) {
                            const newComment = {
                                id: `comment_${Date.now()}`,
                                author,
                                text,
                                createdAt: new Date(),
                                replies: []
                            };
                            return { ...thread, comments: [...(thread.comments || []), newComment] };
                        }
                        return thread;
                    }));
                    return;
                }
                const { collection, addDoc, serverTimestamp } = firebase.firestore;
                try {
                    const commentsCollectionRef = collection(db, `/artifacts/${appId}/public/data/forum/threads/${threadId}/comments`);
                    await addDoc(commentsCollectionRef, {
                        author,
                        text,
                        createdAt: serverTimestamp(),
                        userId,
                        replies: []
                    });
                } catch (error) {
                    console.error("Error adding comment: ", error);
                }
            };

            const addThread = async (title, content, author) => {
                // 樂觀更新
                const tempId = `t_${Date.now()}`;
                setThreads(prev => [{ id: tempId, title, content, createdAt: new Date(), comments: [] }, ...prev]);
                if (!userId || !db) return;
                const { collection, addDoc, serverTimestamp } = firebase.firestore;
                try {
                    const threadsCollectionRef = collection(db, `/artifacts/${appId}/public/data/forum/threads`);
                    await addDoc(threadsCollectionRef, { title, content, author, createdAt: serverTimestamp() });
                } catch (e) {
                    console.error('新增主題失敗:', e);
                }
            };

            const addReply = async (threadId, parentCommentId, author, text) => {
                if (!userId || !db) {
                    // 離線模式：直接更新本地狀態
                    setThreads(prevThreads => {
                        return prevThreads.map(thread => {
                            if (thread.id === threadId) {
                                return {
                                    ...thread,
                                    comments: thread.comments.map(comment => {
                                        if (comment.id === parentCommentId) {
                                            const newReply = {
                                                id: `reply_${Date.now()}`,
                                                author,
                                                text,
                                                createdAt: new Date(),
                                                replies: []
                                            };
                                            return {
                                                ...comment,
                                                replies: [...(comment.replies || []), newReply]
                                            };
                                        }
                                        return comment;
                                    })
                                };
                            }
                            return thread;
                        });
                    });
                    return;
                }

                const { collection, addDoc, serverTimestamp } = firebase.firestore;
                try {
                    const repliesCollectionRef = collection(db, `/artifacts/${appId}/public/data/forum/threads/${threadId}/comments/${parentCommentId}/replies`);
                    await addDoc(repliesCollectionRef, {
                        author,
                        text,
                        createdAt: serverTimestamp(),
                        userId
                    });
                } catch (error) {
                    console.error("Error adding reply: ", error);
                }
            };

            const Navigation = () => (
                <header className="w-full max-w-7xl mx-auto px-6 py-8">
                    <nav className="flex justify-between items-center">
                        <a href="#" onClick={(e) => {e.preventDefault(); setPage({ name: 'home' })}} className="flex items-center space-x-3 cursor-pointer">
                            <span className="font-bold text-xl text-white">{profileData.name}</span>
                            <span className="text-slate-500">/</span>
                            <span className="font-mono text-sm text-slate-400">{profileData.subtitle}</span>
                        </a>
                        <div className="hidden md:flex items-center space-x-8 text-sm font-medium">
                            <a href="#" onClick={(e) => {e.preventDefault(); setPage({ name: 'resume' })}} className="text-slate-300 hover:text-white transition-colors">履歷</a>
                            <a href={profileData.linkedinUrl} target="_blank" className="text-slate-300 hover:text-white transition-colors">LinkedIn</a>
                            <a href="#" onClick={(e) => {e.preventDefault(); setPage({ name: 'forum' })}} className="text-slate-300 hover:text-white transition-colors">討論區</a>
                        </div>
                    </nav>
                </header>
            );

            const renderPage = () => {
                switch (page.name) {
                    case 'forum':
                        return <ForumPage setPage={setPage} threads={threads} addThread={addThread} />;
                    case 'threadDetail': {
                        const thread = threads.find(t => t.id === page.threadId);
                        return thread ? <ThreadDetailPage setPage={setPage} thread={thread} addComment={addComment} addReply={addReply} /> : <div>Loading thread...</div>;
                    }
                    case 'contact':
                        return <ContactPage setPage={setPage} />;
                    case 'resume':
                        return <ResumePage setPage={setPage} />;
                    default:
                        return <HomePage setPage={setPage} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation />
                    {renderPage()}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
